<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day of Danbury</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    .title {
      font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif;
      font-weight: 700;
    }

    /* Keep hamburger inside the menu panel when open */
    .hamburger {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      transition: right 0.5s ease, top 0.5s ease, transform 0.5s ease;
    }
    .hamburger.active {
      position: fixed;
      right: 50px;
      top: 40px;
      transform: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1 class="title">Day of Danbury</h1>
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- Slide-in Menu -->
  <nav class="menu" id="menu">
    <ul>
      <li><a href="About.html">About</a></li>
      <li><a href="Vendors.html">Vendors</a></li>
      <li><a href="Sponsors.html">Sponsors</a></li>
      <li><a href="Donate.html">Donate</a></li>

      <li><a href="Contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Logo / Mitosis Animation + Event Buttons -->
  <div class="container">
    <div class="animation-area">

      <!-- Clones row -->
      <div class="logo-wrapper" id="logoWrapper" onclick="splitLogo()">
        <img src="images/Blue Button.png"   class="logo"       id="mainLogo">
        <img src="images/Center 4 Blue.png" class="logo clone clone1" id="clone1">
        <img src="images/TNAD Blue.png"     class="logo clone clone2" id="clone2">
        <img src="images/Blue Button.png"   class="logo clone clone3" id="clone3">
      </div>

      <!-- Event buttons row -->
      <div class="event-buttons" id="eventButtons">
        <img src="images/dod festival button.png" class="event-btn" id="festivalBtn">
        <img src="images/the db button.png"       class="event-btn" id="dbBtn">
      </div>

    </div>
  </div>

  <!-- Countdown -->
  <div class="countdown">
    <div class="time"><span id="days">0</span><span class="label">Days</span></div>
    <div class="time"><span id="hours">0</span><span class="label">Hours</span></div>
    <div class="time"><span id="minutes">0</span><span class="label">Minutes</span></div>
    <div class="time"><span id="seconds">0</span><span class="label">Seconds</span></div>
  </div>

  <script>
    // Countdown
    const targetDate = new Date("June 27, 2026 12:00:00 GMT-0400").getTime();
    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;
      if (distance < 0) return;
      document.getElementById("days").innerText    = Math.floor(distance / (1000*60*60*24));
      document.getElementById("hours").innerText   = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      document.getElementById("minutes").innerText = Math.floor((distance % (1000*60*60)) / (1000*60));
      document.getElementById("seconds").innerText = Math.floor((distance % (1000*60)) / 1000);
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // Logo split / mitosis
    function splitLogo() {
      var wrapper = document.getElementById("logoWrapper");
      if (wrapper.classList.contains("active")) return;

      var mainLogo = document.getElementById("mainLogo");
      var homeBtn  = document.getElementById("homeBtn");

      var logoRect = mainLogo.getBoundingClientRect();

      homeBtn.style.visibility = "hidden";
      homeBtn.style.display    = "block";
      var btnRect = homeBtn.getBoundingClientRect();
      homeBtn.style.display    = "none";
      homeBtn.style.visibility = "";

      var targetLeft = btnRect.left + btnRect.width  / 2 - 35;
      var targetTop  = btnRect.top  + btnRect.height / 2 - 35;

      var flyer = document.createElement("img");
      flyer.src = "images/Blue Button.png";
      flyer.style.position      = "fixed";
      flyer.style.left          = logoRect.left + "px";
      flyer.style.top           = logoRect.top  + "px";
      flyer.style.width         = logoRect.width  + "px";
      flyer.style.height        = logoRect.height + "px";
      flyer.style.pointerEvents = "none";
      flyer.style.zIndex        = "999";
      flyer.style.transition    = "none";
      document.body.appendChild(flyer);

      wrapper.classList.add("active");

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          flyer.style.transition = "left 0.8s ease, top 0.8s ease, width 0.8s ease, height 0.8s ease";
          flyer.style.left   = targetLeft + "px";
          flyer.style.top    = targetTop  + "px";
          flyer.style.width  = "70px";
          flyer.style.height = "70px";
        });
      });

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          document.getElementById("eventButtons").classList.add("visible");
        });
      });

      setTimeout(function() {
        document.getElementById("clone1").style.pointerEvents = "auto";
        document.getElementById("clone2").style.pointerEvents = "auto";
        document.getElementById("clone3").style.pointerEvents = "auto";
        homeBtn.style.display = "block";
        requestAnimationFrame(function() {
          homeBtn.classList.add("visible");
        });
        flyer.remove();
      }, 820);
    }

    // Clone link clicks
    document.getElementById("clone1").addEventListener("click", function(e) {
      e.stopPropagation();
      if (document.getElementById("logoWrapper").classList.contains("active"))
        window.open("https://thecenterct.org/who-we-are/", "_blank");
    });
    document.getElementById("clone2").addEventListener("click", function(e) {
      e.stopPropagation();
      if (document.getElementById("logoWrapper").classList.contains("active"))
        window.open("https://www.thenewamericandreamfoundation.org/", "_blank");
    });
    document.getElementById("clone3").addEventListener("click", function(e) {
      e.stopPropagation();
      // No link yet
    });

    // Event button links
    document.getElementById("festivalBtn").addEventListener("click", function() {
      window.location.href = "dodfest.html";
    });
    document.getElementById("dbBtn").addEventListener("click", function() {
      window.location.href = "dbenefit.html";
    });

    // Hamburger toggle
    document.getElementById("hamburger").addEventListener("click", function() {
      document.getElementById("hamburger").classList.toggle("active");
      document.getElementById("menu").classList.toggle("active");
    });
  </script>

  <!-- Home Button (fixed bottom center) -->
  <img src="images/Blue Button.png" id="homeBtn" onclick="window.location.href='index.html'">

</body>
</html>
