<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsors - Day of Danbury</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .title { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-weight: 700; }
    .subpage-title { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-weight: 700; }
    .coming-soon { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-weight: 700; }
    .hamburger-wrap { position: absolute; right: 50px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 10px; cursor: pointer; z-index: 60; }
    .hamburger-wrap.active { position: fixed; top: 40px; right: 50px; transform: none; }
    .menu-label, .close-label { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; user-select: none; transition: opacity 0.3s ease; }
    .menu-label { color: #486FFF; opacity: 1; }
    .close-label { color: #fff; opacity: 0; position: absolute; right: 45px; pointer-events: none; }
    .hamburger-wrap.active .menu-label { opacity: 0; pointer-events: none; }
    .hamburger-wrap.active .close-label { opacity: 1; pointer-events: auto; }
    .hamburger { position: static; transform: none; right: auto; top: auto; flex-shrink: 0; }
    .hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); background: #fff; }
    .hamburger.active span:nth-child(2) { transform: translateY(-10px) rotate(-45deg); background: #fff; }
    @media (max-width: 768px) {
      .header { display: flex; align-items: center; justify-content: center; position: relative; padding: 0 80px 0 20px; }
      .hamburger-wrap { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }
      .hamburger-wrap.active { position: fixed; top: 40px; right: 20px; transform: none; }
    }
  </style>
  <style>
    .sponsor-wrap { width: 100%; max-width: 680px; padding: 40px 20px 120px 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .sponsor-heading { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 2.8rem; font-weight: 700; color: #486FFF; text-align: center; }
    .sponsor-sub { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 1rem; color: #486FFF; text-align: center; line-height: 1.7; max-width: 580px; }
    .sponsor-warning { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 0.85rem; font-weight: 700; color: #486FFF; text-align: center; border: 2px solid #486FFF; border-radius: 8px; padding: 12px 20px; max-width: 580px; line-height: 1.6; }
    .sponsor-form { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
    .form-row { display: flex; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .form-group label { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 0.78rem; font-weight: 700; color: #486FFF; letter-spacing: 1.5px; text-transform: uppercase; }
    .form-group input, .form-group textarea { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 0.95rem; color: #486FFF; background: transparent; border: none; border-bottom: 2px solid #486FFF; padding: 8px 2px; outline: none; width: 100%; transition: border-color 0.2s ease; }
    .form-group input:focus, .form-group textarea:focus { border-bottom-color: #2a4fd4; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .submit-btn { font-family: 'Futura', 'Josefin Sans', 'Century Gothic', Arial, sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; background: #486FFF; border: none; border-radius: 8px; padding: 16px 40px; cursor: pointer; align-self: center; margin-top: 10px; transition: opacity 0.2s ease, transform 0.2s ease; }
    .submit-btn:hover { opacity: 0.85; transform: scale(1.03); }
    @media (max-width: 560px) { .form-row { flex-direction: column; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="title">Day of Danbury</a>
    <div class="hamburger-wrap" id="hamburgerWrap">
      <span class="menu-label">Menu</span>
      <span class="close-label">Close</span>
      <div class="hamburger" id="hamburger"><span></span><span></span></div>
    </div>
  </header>

  <nav class="menu" id="menu">
    <ul>
      <li><a href="About.html">About</a></li>
      <li><a href="Vendors.html">Vendors</a></li>
      <li><a href="Sponsors.html">Sponsors</a></li>
      <li><a href="Donate.html">Donate</a></li>
      <li><a href="Contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="sponsor-wrap">

      <h2 class="sponsor-heading">Become a Supporting Partner</h2>
      <p class="sponsor-sub">We'd love to hear from you! Fill out the form below to get started.</p>
      <p class="sponsor-warning">PLEASE DO NOT USE THIS FORM IF YOU ARE TRYING TO BECOME A VENDOR AT DAY OF DANBURY.</p>

      <form class="sponsor-form" action="https://formspree.io/f/xykbbnvl" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label>First Name <span style="opacity:0.5">(required)</span></label>
            <input type="text" name="first_name" required>
          </div>
          <div class="form-group">
            <label>Last Name <span style="opacity:0.5">(required)</span></label>
            <input type="text" name="last_name" required>
          </div>
        </div>
        <div class="form-group">
          <label>Title <span style="opacity:0.5">(required)</span></label>
          <input type="text" name="title" required>
        </div>
        <div class="form-group">
          <label>Email <span style="opacity:0.5">(required)</span></label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Brand Name <span style="opacity:0.5">(required)</span></label>
          <input type="text" name="brand_name" required>
        </div>
        <div class="form-group">
          <label>Brand Website</label>
          <input type="text" name="brand_website">
        </div>
        <div class="form-group">
          <label>Brand Instagram</label>
          <input type="text" name="brand_instagram">
        </div>
        <div class="form-group">
          <label>Sponsorship Interest Details <span style="opacity:0.5">(required)</span></label>
          <textarea name="sponsorship_details" required></textarea>
        </div>
        <input type="hidden" name="_next" value="https://dayofdanbury.com/thankyou.html">
        <button type="submit" class="submit-btn">Send</button>
      </form>

    </div>
  </div>

  <div class="countdown">
    <div class="time"><span id="days">0</span><span class="label">Days</span></div>
    <div class="time"><span id="hours">0</span><span class="label">Hours</span></div>
    <div class="time"><span id="minutes">0</span><span class="label">Minutes</span></div>
    <div class="time"><span id="seconds">0</span><span class="label">Seconds</span></div>
  </div>

  <img src="images/Blue Button.png" id="homeBtnStatic" onclick="window.location.href='index.html'">

  <script>
    const targetDate = new Date("June 27, 2026 12:00:00 GMT-0400").getTime();
    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;
      if (distance < 0) return;
      document.getElementById("days").innerText    = Math.floor(distance / (1000*60*60*24));
      document.getElementById("hours").innerText   = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      document.getElementById("minutes").innerText = Math.floor((distance % (1000*60*60)) / (1000*60));
      document.getElementById("seconds").innerText = Math.floor((distance % (1000*60)) / 1000);
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
    document.getElementById("hamburgerWrap").addEventListener("click", function() {
      this.classList.toggle("active");
      document.getElementById("hamburger").classList.toggle("active");
      document.getElementById("menu").classList.toggle("active");
    });
  </script>
</body>
</html>
